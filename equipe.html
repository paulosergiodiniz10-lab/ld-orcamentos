<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Orçamentos - Minha Equipe</title>
    <!-- Tailwind CSS e Ícones -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Menu Superior Padrão -->
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    LD Orçamentos
                </div>
                <div class="hidden md:flex space-x-2">
                    <button onclick="window.location.href='empresa.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <button onclick="window.location.href='equipe.html'" class="bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button onclick="window.location.href='aptos.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button onclick="window.location.href='orcamentos.html'" class="bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-md font-bold text-sm shadow-sm transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo da Página -->
    <main class="flex-grow max-w-6xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        
        <!-- Cabeçalho com Botão de Criar -->
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Minha Equipe</h1>
                <p class="text-sm text-gray-500 mt-1">Gerencie os atendentes e vendedores do sistema.</p>
            </div>
            <button onclick="abrirModalParaCriar()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-md text-sm font-bold shadow transition-colors flex items-center gap-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Novo Integrante
            </button>
        </div>

        <!-- Tabela de Membros -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                    <thead class="bg-gray-50 text-xs font-semibold uppercase tracking-wider text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Nome</th>
                            <th class="px-6 py-4">E-mail</th>
                            <th class="px-6 py-4">Nível de Acesso</th>
                            <th class="px-6 py-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEquipeBody" class="divide-y divide-gray-200 bg-white text-gray-700">
                        <!-- Os dados entram aqui via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form de Cadastro e Edição -->
    <div id="membroModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl border border-gray-200 max-w-md w-full overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 id="modalTitulo" class="text-base font-bold text-gray-900 flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5 text-blue-600"></i> Cadastrar Integrante
                </h3>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="membroForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                        <input type="text" id="nomeMembro" class="mt-1 border block w-full rounded-md py-2 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">E-mail Comercial</label>
                        <input type="email" id="emailMembro" class="mt-1 border block w-full rounded-md py-2 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nível de Acesso</label>
                        <select id="acessoMembro" class="mt-1 border block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300 bg-white">
                            <option value="Atendente">Atendente (Apenas faz cotações)</option>
                            <option value="Administrador">Administrador (Acesso total)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 px-6 py-4 border-t flex justify-end gap-3">
                <button onclick="fecharModal()" class="bg-white border rounded-md py-2 px-4 text-sm font-medium text-gray-700">Cancelar</button>
                <button onclick="salvarMembro()" class="bg-blue-600 text-white rounded-md py-2 px-4 text-sm font-bold hover:bg-blue-700 shadow-sm">Salvar Integrante</button>
            </div>
        </div>
    </div>

    <!-- Pop-up Toast Profissional -->
    <div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0 z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toastTexto" class="font-medium text-sm">Operação realizada!</span>
    </div>

    <script>
        lucide.createIcons();
        let listaEquipe = [];
        let indexSendoEditado = null; // Guarda se estamos editando alguém

        function dispararToast(mensagem) {
            document.getElementById('toastTexto').innerText = mensaje;
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-10', 'opacity-0'), 3000);
        }

        function abrirModalParaCriar() {
            indexSendoEditado = null;
            document.getElementById('modalTitulo').innerHTML = `<i data-lucide="user-plus" class="w-5 h-5 text-blue-600"></i> Cadastrar Integrante`;
            document.getElementById('membroForm').reset();
            document.getElementById('membroModal').style.display = 'flex';
            lucide.createIcons();
        }

        function abrirModalParaEditar(index) {
            indexSendoEditado = index;
            const membro = listaEquipe[index];
            
            document.getElementById('modalTitulo').innerHTML = `<i data-lucide="edit" class="w-5 h-5 text-blue-600"></i> Editar Integrante`;
            document.getElementById('nomeMembro').value = membro.nome;
            document.getElementById('emailMembro').value = membro.email;
            document.getElementById('acessoMembro').value = membro.acesso;
            
            document.getElementById('membroModal').style.display = 'flex';
            lucide.createIcons();
        }

        function fecharModal() {
            document.getElementById('membroModal').style.display = 'none';
            document.getElementById('membroForm').reset();
            indexSendoEditado = null;
        }

        function renderizarTabelaMembros() {
            const tbody = document.getElementById('tabelaEquipeBody');
            tbody.innerHTML = "";

            listaEquipe.forEach((membro, index) => {
                const badgeCor = membro.acesso === 'Administrador' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50/70 transition-colors border-b border-gray-100">
                        <td class="px-6 py-4 font-medium text-gray-900 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs">EQ</div>
                            ${membro.nome}
                        </td>
                        <td class="px-6 py-4 text-gray-500">${membro.email}</td>
                        <td class="px-6 py-4"><span class="px-2.5 py-0.5 rounded-full text-xs font-semibold ${badgeCor}">${membro.acesso}</span></td>
                        <td class="px-6 py-4 text-right space-x-3">
                            <button onclick="abrirModalParaEditar(${index})" class="text-gray-400 hover:text-blue-600 transition-colors" title="Editar"><i data-lucide="edit" class="w-4 h-4 inline"></i></button>
                            <button onclick="removerMembroLista(${index})" class="text-gray-400 hover:text-red-600 transition-colors" title="Excluir"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button>
                        </td>
                    </tr>`;
            });
            lucide.createIcons();
        }

        function salvarMembro() {
            const nome = document.getElementById('nomeMembro').value.trim();
            const email = document.getElementById('emailMembro').value.trim();
            const acesso = document.getElementById('acessoMembro').value;

            if(!nome || !email) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            if(indexSendoEditado !== null) {
                // Atualiza integrante existente
                listaEquipe[indexSendoEditado] = { nome, email, acesso };
                dispararToast("Integrante atualizado com sucesso!");
            } else {
                // Cria um novo integrante
                listaEquipe.push({ nome, email, acesso });
                dispararToast("Integrante cadastrado com sucesso!");
            }

            localStorage.setItem('ld_lista_equipe', JSON.stringify(listaEquipe));
            renderizarTabelaMembros();
            fecharModal();
        }

        function removerMembroLista(index) {
            if(confirm("Deseja realmente remover este integrante da equipe?")) {
                listaEquipe.splice(index, 1);
                localStorage.setItem('ld_lista_equipe', JSON.stringify(listaEquipe));
                renderizarTabelaMembros();
                dispararToast("Integrante removido da equipe.");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const memoria = localStorage.getItem('ld_lista_equipe');
            if (memoria) {
                listaEquipe = JSON.parse(memoria);
            } else {
                listaEquipe = [{ nome: "Paulo Sérgio (Você)", email: "paulo.diniz@agencia.com", acesso: "Administrador" }];
                localStorage.setItem('ld_lista_equipe', JSON.stringify(listaEquipe));
            }
            renderizarTabelaMembros();
        });
    </script>
</body>
</html>
