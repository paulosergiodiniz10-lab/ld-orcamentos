<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTL Orçamentos - Equipe</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- FIREBASE SDK & PROTEÇÃO DE ROTA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYLQe83O55AQszAvfUx0fcXxICsu8XWss",
            authDomain: "htl-orcamentos.firebaseapp.com",
            projectId: "htl-orcamentos",
            storageBucket: "htl-orcamentos.firebasestorage.app",
            messagingSenderId: "743021262224",
            appId: "1:743021262224:web:bbb3f6238d82e5a5536f15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // O GUARDA-COSTAS: Se não estiver logado, expulsa pra tela de login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; 
            }
        });

        window.fazerLogout = function() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => console.error("Erro ao sair", error));
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Menu Superior Protegido -->
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    HTL Orçamentos
                </div>
                <div class="hidden md:flex space-x-2 items-center">
                    <button type="button" onclick="window.location.href='empresa.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <!-- Botão Ativo -->
                    <button type="button" onclick="window.location.href='equipe.html'" class="cursor-pointer bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button type="button" onclick="window.location.href='aptos.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button type="button" onclick="window.location.href='orcamentos.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                    
                    <div class="h-6 w-px bg-blue-400/50 mx-2"></div>
                    <button type="button" onclick="fazerLogout()" class="cursor-pointer text-blue-100 hover:text-white hover:bg-red-500 px-3 py-2 rounded-md text-sm font-bold transition-colors flex items-center gap-2" title="Sair do Sistema">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Gestão de Equipe</h1>
                <p class="text-sm text-gray-500 mt-1">Cadastre seus atendentes para que eles tenham acesso ao gerador de orçamentos.</p>
            </div>
            <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-md text-sm font-bold shadow transition-colors flex items-center justify-center gap-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Novo Atendente
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-xs font-bold uppercase tracking-wider text-gray-500 border-b">
                        <tr>
                            <th class="py-4 px-6">Nome do Atendente</th>
                            <th class="py-4 px-6">E-mail de Login</th>
                            <th class="py-4 px-6">Nível de Acesso</th>
                            <th class="py-4 px-6">Status</th>
                            <th class="py-4 px-6 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-gray-700">
                        
                        <!-- Linha de Exemplo (Sua conta Admin) -->
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-6 font-bold text-gray-900 flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs">
                                    AD
                                </div>
                                Administrador Principal
                            </td>
                            <td class="py-4 px-6 text-gray-500">Seu e-mail de acesso</td>
                            <td class="py-4 px-6"><span class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs font-bold">Admin</span></td>
                            <td class="py-4 px-6"><span class="flex items-center gap-1.5 text-green-600 text-xs font-bold"><div class="w-2 h-2 rounded-full bg-green-500"></div> Ativo</span></td>
                            <td class="py-4 px-6 text-right space-x-2">
                                <button class="text-gray-400 cursor-not-allowed" disabled title="Não é possível excluir o dono da conta"><i data-lucide="lock" class="w-4 h-4 inline"></i></button>
                            </td>
                        </tr>

                        <!-- Estado Vazio para novos usuários -->
                        <tr>
                            <td colspan="5" class="py-12 text-center text-gray-400">
                                <div class="flex flex-col items-center justify-center">
                                    <i data-lucide="users" class="w-12 h-12 text-gray-200 mb-3"></i>
                                    <p>Nenhum atendente extra cadastrado.</p>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8"><p class="text-center text-xs text-gray-500">&copy; 2026 HTL Orçamentos.</p></div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
