<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Orçamentos - Meus Aptos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    LD Orçamentos
                </div>
                <div class="hidden md:flex space-x-2">
                    <button onclick="window.location.href='empresa.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <button onclick="window.location.href='equipe.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button onclick="window.location.href='aptos.html'" class="bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button onclick="window.location.href='orcamentos.html'" class="bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-md font-bold text-sm shadow-sm transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Cadastro de Apartamento</h1>
                <p class="text-sm text-gray-500 mt-1">Configure as regras de ocupação, capacidades e valores base do imóvel.</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 sm:p-8">
                <form id="aptoForm" class="space-y-8">
                    <!-- Identificação -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2 flex items-center gap-2"><i data-lucide="home" class="w-4 h-4 text-blue-500"></i> Identificação</h3>
                         <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-4">
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Nome do Imóvel</label>
                                <input type="text" class="mt-1 focus:ring-blue-500 block w-full sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="Ex: Lacqua diRoma">
                            </div>
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Unidade</label>
                                <input type="text" class="mt-1 focus:ring-blue-500 block w-full sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="101">
                            </div>
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Capacidade Máx.</label>
                                <input type="number" min="1" class="mt-1 focus:ring-blue-500 block w-full sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="Ex: 4">
                            </div>
                         </div>
                    </div>

                    <!-- Valores Adultos -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-blue-500"></i> Valores Base</h3>
                         <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-3">
                            <div><label class="block text-sm font-medium text-gray-700">Single (1 Pessoa)</label><input type="number" class="mt-1 border block w-full rounded-md py-2.5 px-3"></div>
                            <div><label class="block text-sm font-medium text-gray-700">Duplo (2 Pessoas)</label><input type="number" class="mt-1 border block w-full rounded-md py-2.5 px-3"></div>
                            <div><label class="block text-sm font-medium text-gray-700">Adicional (3º+)</label><input type="number" class="mt-1 border block w-full rounded-md py-2.5 px-3"></div>
                         </div>
                    </div>

                    <!-- Regras Crianças -->
                    <div class="bg-blue-50 rounded-lg p-5 border border-blue-100">
                        <h3 class="text-sm font-semibold text-blue-900 tracking-wide uppercase mb-4 border-b border-blue-200 pb-2 flex items-center gap-2"><i data-lucide="baby" class="w-4 h-4 text-blue-600"></i> Regras Crianças</h3>
                         <div class="grid grid-cols-1 gap-y-6 gap-x-6 sm:grid-cols-4">
                            <div class="sm:col-span-2 grid grid-cols-2 gap-4 bg-white p-4 rounded-md shadow-sm border border-gray-100">
                                <div class="col-span-2"><p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Cortesia (Free)</p></div>
                                <div><label class="block text-sm font-medium text-gray-700">Idade Limite</label><input type="number" class="mt-1 border block w-full rounded-md py-2 px-3"></div>
                                <div><label class="block text-sm font-medium text-gray-700">Qtd. Máxima</label><input type="number" class="mt-1 border block w-full rounded-md py-2 px-3"></div>
                            </div>
                            <div class="sm:col-span-2 grid grid-cols-2 gap-4 bg-white p-4 rounded-md shadow-sm border border-gray-100">
                                <div class="col-span-2"><p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Taxa Jovem (Pagante)</p></div>
                                <div><label class="block text-sm font-medium text-gray-700">Idade Limite</label><input type="number" class="mt-1 border block w-full rounded-md py-2 px-3"></div>
                                <div><label class="block text-sm font-medium text-gray-700">Valor Fixo R$</label><input type="number" class="mt-1 border block w-full rounded-md py-2 px-3"></div>
                            </div>
                         </div>
                    </div>
                </form>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 flex items-center justify-end border-t border-gray-200 gap-3">
                <button type="button" class="bg-white border rounded-md py-2.5 px-5 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancelar</button>
                <button type="button" onclick="salvarApto()" class="bg-blue-600 text-white rounded-md py-2.5 px-6 text-sm font-medium hover:bg-blue-700 flex items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> Salvar Apto</button>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8"><p class="text-center text-xs text-gray-500">&copy; 2026 LD Orçamentos. Todos os direitos reservados.</p></div>
    </footer>

    <script>
        lucide.createIcons();
        function salvarApto() { alert("Apartamento salvo!"); }
    </script>
</body>
</html>
