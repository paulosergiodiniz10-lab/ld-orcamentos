<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Orçamentos - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Barra de Navegação Superior -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl">
                    LD Orçamentos 🏢
                </div>
                <div class="flex space-x-4">
                    <button class="hover:bg-blue-700 px-3 py-2 rounded">Minha Empresa</button>
                    <button class="hover:bg-blue-700 px-3 py-2 rounded">Minha Equipe</button>
                    <button class="hover:bg-blue-700 px-3 py-2 rounded">Meus Aptos</button>
                    <button class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded font-bold">Orçamentos</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Área Principal -->
    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow px-5 py-6 sm:px-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Bem-vindo ao Sistema de Orçamentos</h2>
            <p class="text-gray-600">O projeto foi iniciado com sucesso!</p>
        </div>
    </main>

</body>
</html>
