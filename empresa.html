<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Orçamentos - Minha Empresa</title>
    <!-- Tailwind CSS e Ícones -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Menu Superior Padrão -->
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    LD Orçamentos
                </div>
                <div class="hidden md:flex space-x-2">
                    <button onclick="window.location.href='empresa.html'" class="bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <button onclick="window.location.href='equipe.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button onclick="window.location.href='aptos.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button onclick="window.location.href='orcamentos.html'" class="bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-md font-bold text-sm shadow-sm transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo da Página -->
    <main class="flex-grow max-w-4xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Configurações da Empresa</h1>
            <p class="text-sm text-gray-500 mt-1">Insira as informações da sua agência/hotel.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 sm:p-8">
                <form id="empresaForm" class="space-y-8">
                    
                    <!-- Campo do Logotipo -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2">Logotipo da Agência</h3>
                        <div class="flex items-center gap-6">
                            <div class="w-24 h-24 bg-blue-50 rounded-lg flex items-center justify-center border-2 border-blue-100 overflow-hidden shrink-0">
                                <img id="logoPreview" src="" alt="Logo" class="w-full h-full object-contain p-2" style="display: none;">
                                <i data-lucide="image-plus" class="w-8 h-8 text-blue-300" id="logoPlaceholderIcon"></i>
                            </div>
                            <div class="flex-1">
                                <label for="logoUpload" class="relative block w-full border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 hover:bg-blue-50 transition-colors cursor-pointer group">
                                    <div class="space-y-1">
                                        <i data-lucide="upload-cloud" class="mx-auto h-8 w-8 text-gray-400 group-hover:text-blue-500"></i>
                                        <div class="text-sm text-gray-600">
                                            <span class="font-semibold text-blue-600 group-hover:text-blue-700">Clique para selecionar a logo</span>
                                        </div>
                                    </div>
                                    <input id="logoUpload" type="file" class="sr-only" accept="image/png, image/jpeg" onchange="uploadFoto(this)">
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Campos de Texto -->
                    <div>
                         <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2">Informações Comerciais</h3>
                         <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Nome Fantasia / Razão Social</label>
                                <input type="text" id="nomeEmpresa" class="mt-1 border block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">CPF ou CNPJ</label>
                                <input type="text" id="docEmpresa" class="mt-1 border block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300" placeholder="11.111.222/0001-66">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">WhatsApp Comercial</label>
                                <input type="tel" id="telEmpresa" class="mt-1 border block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300" placeholder="(64) 98100-5505">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">E-mail Comercial</label>
                                <input type="email" id="emailEmpresa" class="mt-1 border block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                            </div>
                         </div>
                    </div>
                </form>
            </div>
            
            <!-- Botão de Salvar -->
            <div class="bg-gray-50 px-6 py-4 flex items-center justify-end border-t border-gray-200">
                <button type="button" onclick="salvarFormularioEmpresa()" class="bg-blue-600 text-white rounded-md py-2.5 px-6 text-sm font-bold hover:bg-blue-700 flex items-center gap-2 shadow-sm">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Dados
                </button>
            </div>
        </div>
    </main>

    <!-- Notificação Toast Elegante -->
    <div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0 z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span class="font-medium text-sm">Dados salvos com sucesso!</span>
    </div>

    <script>
        // Ativa os ícones da tela
        lucide.createIcons();
        let fotoSalvaBase64 = "";

        // Transforma a foto enviada em texto para conseguir salvar no navegador
        function uploadFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fotoSalvaBase64 = e.target.result;
                    mostrarFotoNaTela(fotoSalvaBase64);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function mostrarFotoNaTela(base64) {
            const preview = document.getElementById('logoPreview');
            const placeholder = document.getElementById('logoPlaceholderIcon');
            if (base64) {
                preview.src = base64;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
        }

        // SALVAR: Pega tudo e joga na memória do PC
        function salvarFormularioEmpresa() {
            const dadosEmpresa = {
                nome: document.getElementById('nomeEmpresa').value,
                doc: document.getElementById('docEmpresa').value,
                tel: document.getElementById('telEmpresa').value,
                email: document.getElementById('emailEmpresa').value,
                logo: fotoSalvaBase64
            };
            
            localStorage.setItem('ld_dados_empresa', JSON.stringify(dadosEmpresa));
            
            // Mostra o pop-up profissional (Toast)
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }

        // CARREGAR NO F5: Assim que abre a página, recupera o que foi salvo
        document.addEventListener("DOMContentLoaded", () => {
            const memoria = localStorage.getItem('ld_dados_empresa');
            if (memoria) {
                const dados = JSON.parse(memoria);
                document.getElementById('nomeEmpresa').value = dados.nome || "";
                document.getElementById('docEmpresa').value = dados.doc || "";
                document.getElementById('telEmpresa').value = dados.tel || "";
                document.getElementById('emailEmpresa').value = dados.email || "";
                if (dados.logo) {
                    fotoSalvaBase64 = dados.logo;
                    mostrarFotoNaTela(fotoSalvaBase64);
                }
            }
        });
    </script>
</body>
</html>
