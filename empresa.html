<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Orçamentos - Minha Empresa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    LD Orçamentos
                </div>
                <div class="hidden md:flex space-x-2">
                    <button onclick="window.location.href='empresa.html'" class="bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <button onclick="window.location.href='equipe.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button onclick="window.location.href='aptos.html'" class="hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button onclick="window.location.href='orcamentos.html'" class="bg-orange-500 hover:bg-orange-600 px-5 py-2 rounded-md font-bold text-sm shadow-sm transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Configurações da Empresa</h1>
            <p class="text-sm text-gray-500 mt-1">Atualize as informações da sua agência que aparecerão nos orçamentos gerados.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 sm:p-8">
                <form id="empresaForm" class="space-y-8">
                    <!-- Logotipo -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2">Logotipo da Agência</h3>
                        <div class="flex items-center gap-6">
                            <div class="w-24 h-24 bg-blue-50 rounded-lg flex items-center justify-center border-2 border-blue-100 overflow-hidden shrink-0">
                                <img id="logoPreview" src="https://via.placeholder.com/150?text=Logo" alt="Logo preview" class="w-full h-full object-contain p-2" style="display: none;">
                                <i data-lucide="image-plus" class="w-8 h-8 text-blue-300" id="logoPlaceholderIcon"></i>
                            </div>
                            <div class="flex-1">
                                <label for="logoUpload" class="relative block w-full border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 hover:bg-blue-50 transition-colors cursor-pointer group">
                                    <div class="space-y-1">
                                        <i data-lucide="upload-cloud" class="mx-auto h-8 w-8 text-gray-400 group-hover:text-blue-500"></i>
                                        <div class="text-sm text-gray-600">
                                            <span class="font-semibold text-blue-600 group-hover:text-blue-700">Clique para enviar a logo</span> ou arraste e solte
                                        </div>
                                        <p class="text-xs text-gray-500">Formatos JPG, PNG (Max. 2MB)</p>
                                    </div>
                                    <input id="logoUpload" name="logoUpload" type="file" class="sr-only" accept="image/png, image/jpeg" onchange="previewImage(event)">
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Informações -->
                    <div>
                         <h3 class="text-sm font-semibold text-gray-900 tracking-wide uppercase mb-4 border-b pb-2">Informações Comerciais</h3>
                         <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Nome Fantasia / Razão Social</label>
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="store" class="h-4 w-4 text-gray-400"></i></div>
                                    <input type="text" class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="Ex: Caldas Novas Viagens">
                                </div>
                            </div>
                            
                            <!-- Campo CPF/CNPJ com máscara -->
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">CPF ou CNPJ</label>
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="file-text" class="h-4 w-4 text-gray-400"></i></div>
                                    <input type="text" oninput="mascaraCpfCnpj(this)" maxlength="18" class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="000.000.000-00 ou 00.000.000/0000-00">
                                </div>
                            </div>
                            
                            <!-- Campo WhatsApp com máscara -->
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">WhatsApp Comercial</label>
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="smartphone" class="h-4 w-4 text-gray-400"></i></div>
                                    <input type="tel" oninput="mascaraTelefone(this)" maxlength="15" class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="(00) 00000-0000">
                                </div>
                            </div>
                            
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">E-mail Comercial</label>
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="mail" class="h-4 w-4 text-gray-400"></i></div>
                                    <input type="email" class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2.5 px-3 border outline-none" placeholder="contato@suaagencia.com.br">
                                </div>
                            </div>
                         </div>
                    </div>
                </form>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 flex items-center justify-end border-t border-gray-200 gap-3">
                <button type="button" class="bg-white border border-gray-300 rounded-md shadow-sm py-2.5 px-5 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancelar</button>
                <button type="button" onclick="salvarEmpresa()" class="bg-blue-600 border border-transparent rounded-md shadow-sm py-2.5 px-6 text-sm font-medium text-white hover:bg-blue-700 flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Dados
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8"><p class="text-center text-xs text-gray-500">&copy; 2026 LD Orçamentos. Todos os direitos reservados.</p></div>
    </footer>

    <script>
        lucide.createIcons();

        // Função de Preview da Imagem
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('logoPreview');
            const placeholder = document.getElementById('logoPlaceholderIcon');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Máscara Inteligente para CPF ou CNPJ
        function mascaraCpfCnpj(input) {
            let value = input.value.replace(/\D/g, ""); // Remove tudo que não for número
            
            if (value.length <= 11) {
                // Formato CPF
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                // Formato CNPJ
                value = value.replace(/^(\d{2})(\d)/, "$1.$2");
                value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                value = value.replace(/\.(\d{3})(\d)/, ".$1/$2");
                value = value.replace(/(\d{4})(\d)/, "$1-$2");
            }
            
            input.value = value;
        }

        // Máscara para Telefone / WhatsApp
        function mascaraTelefone(input) {
            let value = input.value.replace(/\D/g, "");
            
            value = value.replace(/^(\d{2})(\d)/g, "($1) $2"); // Coloca parênteses
            value = value.replace(/(\d)(\d{4})$/, "$1-$2");    // Coloca traço
            
            input.value = value;
        }

        function salvarEmpresa() {
            alert("Dados da empresa salvos com sucesso!");
        }
    </script>
</body>
</html>
