<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTL Orçamentos - Minha Empresa</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- FIREBASE SDK & FIRESTORE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYLQe83O55AQszAvfUx0fcXxICsu8XWss",
            authDomain: "htl-orcamentos.firebaseapp.com",
            projectId: "htl-orcamentos",
            storageBucket: "htl-orcamentos.firebasestorage.app",
            messagingSenderId: "743021262224",
            appId: "1:743021262224:web:bbb3f6238d82e5a5536f15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let logoBase64 = "";

        // FUNÇÕES DO BANCO DE DADOS
        window.dbCarregarEmpresa = async function(uid) {
            const docRef = doc(db, "empresas", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().dadosEmpresa) {
                return docSnap.data().dadosEmpresa;
            }
            return null;
        }

        window.dbSalvarEmpresa = async function(uid, dados) {
            const docRef = doc(db, "empresas", uid);
            await setDoc(docRef, { dadosEmpresa: dados }, { merge: true });
        }

        // GUARDA-COSTAS E PREENCHIMENTO DE DADOS
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html"; 
            } else {
                window.currentUserUid = user.uid;
                
                // Puxa os dados salvos da nuvem e preenche os campos
                const dados = await window.dbCarregarEmpresa(user.uid);
                if(dados) {
                    document.getElementById('empresaNome').value = dados.nome || '';
                    document.getElementById('empresaEmail').value = dados.emailComercial || '';
                    
                    let cnpjInput = document.getElementById('empresaCnpj');
                    cnpjInput.value = dados.cnpj || '';
                    if(dados.cnpj) window.mascaraCpfCnpj(cnpjInput);

                    let zapInput = document.getElementById('empresaWhatsapp');
                    zapInput.value = dados.whatsapp || '';
                    if(dados.whatsapp) window.mascaraTelefone(zapInput);

                    if(dados.logo) {
                        logoBase64 = dados.logo;
                        document.getElementById('previewLogo').src = dados.logo;
                        document.getElementById('previewLogo').classList.remove('hidden');
                        document.getElementById('iconLogo').classList.add('hidden');
                    }
                }
            }
        });

        // SALVA OS DADOS AO CLICAR NO BOTÃO
        window.salvarAlteracoes = async function() {
            const btn = document.getElementById('btnSalvar');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Salvando...';
            lucide.createIcons();
            btn.disabled = true;
            
            const dados = {
                nome: document.getElementById('empresaNome').value.trim(),
                cnpj: document.getElementById('empresaCnpj').value.trim(),
                whatsapp: document.getElementById('empresaWhatsapp').value.trim(),
                emailComercial: document.getElementById('empresaEmail').value.trim(),
                logo: logoBase64
            };

            try {
                await window.dbSalvarEmpresa(window.currentUserUid, dados);
                window.showToast("Dados da empresa salvos com sucesso!", "success");
            } catch (e) {
                window.showToast("Erro ao salvar na nuvem.", "error");
            }
            
            btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Salvar Dados';
            btn.disabled = false;
            lucide.createIcons();
        }

        window.fazerLogout = function() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => console.error("Erro ao sair", error));
        }

        // SISTEMA DE ALERTAS (TOAST)
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.className = `${bgColor} text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-medium text-sm">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // MÁSCARA INTELIGENTE PARA CPF OU CNPJ
        window.mascaraCpfCnpj = function(input) {
            let v = input.value.replace(/\D/g, "");
            if (v.length <= 11) { // CPF
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else { // CNPJ
                v = v.replace(/^(\d{2})(\d)/, "$1.$2");
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
                v = v.replace(/(\d{4})(\d)/, "$1-$2");
            }
            input.value = v.substring(0, 18);
        }

        // MÁSCARA PARA TELEFONE / WHATSAPP
        window.mascaraTelefone = function(input) {
            let v = input.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            input.value = v.substring(0, 15);
        }

        // PROCESSADOR DE IMAGEM DA LOGO
        window.processarImagemLogo = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.match('image.*')) {
                window.showToast('Selecione uma imagem válida.', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 300; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    logoBase64 = canvas.toDataURL('image/png', 0.9);
                    document.getElementById('previewLogo').src = logoBase64;
                    document.getElementById('previewLogo').classList.remove('hidden');
                    document.getElementById('iconLogo').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Menu Superior -->
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="font-bold text-xl tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                    HTL Orçamentos
                </div>
                <div class="hidden md:flex space-x-2 items-center">
                    <button type="button" onclick="window.location.href='empresa.html'" class="cursor-pointer bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="briefcase" class="w-4 h-4"></i> Minha Empresa
                    </button>
                    <button type="button" onclick="window.location.href='equipe.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                         <i data-lucide="users" class="w-4 h-4"></i> Equipe
                    </button>
                    <button type="button" onclick="window.location.href='aptos.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                        <i data-lucide="bed-double" class="w-4 h-4"></i> Aptos
                    </button>
                    <button type="button" onclick="window.location.href='orcamentos.html'" class="cursor-pointer hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 ml-4">
                        <i data-lucide="calculator" class="w-4 h-4"></i> Orçamentos
                    </button>
                    
                    <div class="h-6 w-px bg-blue-400/50 mx-2"></div>
                    <button type="button" onclick="fazerLogout()" class="cursor-pointer text-blue-100 hover:text-white hover:bg-red-500 px-3 py-2 rounded-md text-sm font-bold transition-colors flex items-center gap-2" title="Sair do Sistema">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8">
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 sm:p-8 space-y-8">
                
                <!-- SESSÃO: LOGOTIPO -->
                <div>
                    <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wide mb-4">Logotipo da Agência</h3>
                    <div class="flex items-center gap-4 border-b border-gray-100 pb-8">
                        <div class="w-24 h-24 rounded-lg border border-blue-100 bg-blue-50 overflow-hidden flex items-center justify-center shrink-0 shadow-sm">
                            <img id="previewLogo" src="" class="w-full h-full object-contain hidden bg-white">
                            <i id="iconLogo" data-lucide="image" class="w-8 h-8 text-blue-300"></i>
                        </div>
                        <div class="flex-1 relative h-24">
                            <input type="file" accept="image/jpeg, image/png, image/jpg" onchange="processarImagemLogo(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="h-full border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center text-blue-600 bg-white hover:bg-blue-50 transition-colors">
                                <i data-lucide="cloud-upload" class="w-6 h-6 mb-1 text-blue-400"></i>
                                <span class="text-sm font-medium">Clique para selecionar a logo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SESSÃO: INFORMAÇÕES COMERCIAIS -->
                <div>
                    <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wide mb-4">Informações Comerciais</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nome Fantasia / Razão Social</label>
                            <input type="text" id="empresaNome" class="block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 transition-colors" placeholder="Ex: Hotel Le Jardin">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">CPF ou CNPJ</label>
                            <input type="text" id="empresaCnpj" oninput="mascaraCpfCnpj(this)" maxlength="18" class="block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 transition-colors" placeholder="00.000.000/0000-00">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Comercial</label>
                            <input type="tel" id="empresaWhatsapp" oninput="mascaraTelefone(this)" maxlength="15" class="block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 transition-colors" placeholder="(00) 00000-0000">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail Comercial</label>
                            <input type="email" id="empresaEmail" class="block w-full rounded-md py-2.5 px-3 outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 transition-colors" placeholder="teste@teste.com">
                        </div>
                        
                    </div>
                </div>

            </div>
            
            <div class="bg-gray-50 px-6 py-4 flex justify-end border-t border-gray-200">
                <button type="button" id="btnSalvar" onclick="salvarAlteracoes()" class="bg-blue-600 text-white rounded-md py-2.5 px-6 text-sm font-bold hover:bg-blue-700 flex items-center gap-2 shadow-sm transition-colors">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Dados
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8"><p class="text-center text-xs text-gray-500">&copy; 2026 HTL Orçamentos.</p></div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
